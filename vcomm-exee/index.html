<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: https: http:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: http:;"
		/>
		<title>VComm</title>
		<link rel="stylesheet" href="assets/css/topbar.css" />
	</head>
	<body>
		<!-- allowpopups dihapus kecuali memang dibutuhkan aplikasinya -->
		<!-- webSecurity=false DIHAPUS - tidak aman. Gunakan unsafely-treat-insecure-origin-as-secure di main.js -->
		<webview id="webview"></webview>

		<div id="error-screen" style="
			display:none; position:fixed; inset:0; background:#f8f9fa;
			font-family:-apple-system,sans-serif; align-items:center;
			justify-content:center; flex-direction:column; text-align:center; padding:40px;
		">
			<div style="font-size:48px;margin-bottom:16px">⚠️</div>
			<h2 style="margin-bottom:8px">URL Belum Dikonfigurasi</h2>
			<p style="color:#666;max-width:400px;margin-bottom:24px">
				Tambahkan <code>webviewUrl</code> di <code>server-config.json</code>.
			</p>
			<pre style="background:#eee;padding:16px 24px;border-radius:8px;font-size:13px;text-align:left">{
  "serverUrl": "http://192.168.x.x:3001",
  "webviewUrl": "http://192.168.x.x:5000"
}</pre>
		</div>

		<script src="assets/js/renderer.js"></script>
		<script>
			window.electron.getWebviewUrl().then(url => {
				const wv = document.getElementById('webview');
				if (url) {
					wv.src = url;
					wv.setAttribute('data-home', url);
				} else {
					wv.style.display = 'none';
					document.getElementById('error-screen').style.display = 'flex';
				}
			});
		</script>
	</body>
</html>
