<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: https: http:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: http:;"
		/>
		<title>VComm</title>
		<link rel="stylesheet" href="assets/css/topbar.css" />
	</head>
	<body>
		
		<webview id="webview"></webview>

		
		<script src="assets/js/renderer.js"></script>
		<script>
			window.electron.getWebviewUrl().then(url => {
				const wv = document.getElementById('webview');
				if (url) {
					wv.src = url;
					wv.setAttribute('data-home', url);
				} else {
					wv.style.display = 'none';
					document.getElementById('error-screen').style.display = 'flex';
				}
			});
		</script>
	</body>
</html>
